StylesPath = .vale/styles
MinAlertLevel = suggestion

Packages = write-good

Vocab = Safire

[*.md]
BasedOnStyles = write-good, Safire
# Downgrade write-good rules that ship as ERROR to WARNING — only Safire terminology blocks CI
write-good.ThereIs = warning
# Disable E-Prime: flags every use of "is/are/be" — too noisy for technical docs
write-good.E-Prime = NO
# Skip Jekyll/YAML front matter
BlockIgnores = (?s)^---.*?---
# Skip Liquid template tags ({{ ... }} and {% ... %})
TokenIgnores = (\{\{[^\}]+\}\}|\{%-?\s[^%]*-?%\})
