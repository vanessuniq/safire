name: Ruby

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '4.0.5']
    uses: ./.github/workflows/ci.yml
    with:
      ruby-version: ${{ matrix.ruby }}
    secrets: inherit
