name: Ruby

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '4.0.5']
        gemfile: ['Gemfile']
        include:
          # Floor combination: Ruby 3.2 (declared minimum) + AS 7.1 (declared minimum)
          - ruby: '3.2'
            gemfile: 'gemfiles/activesupport_71.gemfile'
    uses: ./.github/workflows/ci.yml
    with:
      ruby-version: ${{ matrix.ruby }}
      gemfile: ${{ matrix.gemfile }}
    secrets: inherit
