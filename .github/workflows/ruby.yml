name: Ruby

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  ci:
    strategy:
      fail-fast: false
      matrix:
        ruby: ['3.2', '4.0.5']
        include:
          # Lowest-supported ActiveSupport: exercises the >= 7.1 gemspec lower bound
          - ruby: '3.4'
            gemfile: 'gemfiles/activesupport_71.gemfile'
    uses: ./.github/workflows/ci.yml
    with:
      ruby-version: ${{ matrix.ruby }}
      gemfile: ${{ matrix.gemfile || 'Gemfile' }}
    secrets: inherit
